<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nextora</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
  <div class="container nav">
    <h2 class="logo">Nextora.</h2>

    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">About Us</a></li>
      <li><a href="#">Services</a></li>
      <li><a href="#">Projects</a></li>
      <li><a href="#">Blog</a></li>
      <li><a href="#">Pricing</a></li>
    </ul>

    <div class="auth">
      <a href="#" class="login">Log in</a>
      <a href="#" class="signup">Sign up</a>
    </div>

    <div class="menu-toggle">☰</div>
  </div>
</header>

<main class="hero">
  <div class="container hero-content">

    <!-- LEFT -->
    <div class="left">
      <h1>
        Empower Your <br>
        Business with <br>
        Modern Solutions
      </h1>

      <p>
        Drive growth, enhance productivity, and achieve more with
        our innovative services tailored for modern enterprises.
      </p>

      <div class="buttons">
        <button class="btn primary">Get Started</button>
        <button class="btn secondary">Explore Services</button>
      </div>

      <div class="brands">
        <span>Ovalism</span>
        <span>Orbital</span>
        <span>Webflow</span>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="right">
      <div class="image-card">
        <img src="assets/images/hero.jpg" alt="hero">
        <div class="badge">Active 2k Members</div>
      </div>
    </div>

  </div>
</main>

<script src="js/script.js"></script>
</body>
</html>
